<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — critical for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (browser chrome tint on Android) -->
    <meta name="theme-color" content="#00d4ff" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MomentumX" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <!-- SEO / social -->
    <meta name="description" content="AI-powered goal coaching that builds momentum every day. Set a goal, get a personalized plan, track your streak." />
    <meta property="og:title" content="MomentumX — AI Goal Coach" />
    <meta property="og:description" content="Set a goal. Get a personalized AI plan. Build momentum every day." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MomentumX" />
    <meta name="twitter:description" content="AI-powered goal coaching. Build momentum every day." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>MomentumX — AI Goal Coach</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register service worker — force update on every load -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then(reg => {
              // Force the waiting SW to activate immediately
              reg.update();
              if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              reg.addEventListener('updatefound', () => {
                const newSW = reg.installing;
                if (newSW) {
                  newSW.addEventListener('statechange', () => {
                    if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                      newSW.postMessage({ type: 'SKIP_WAITING' });
                      window.location.reload();
                    }
                  });
                }
              });
            })
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
